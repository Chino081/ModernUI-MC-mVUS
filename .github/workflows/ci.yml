name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  JAVA_VERSION: "25"

jobs:
  build:
    name: Java 25 / Fabric + NeoForge release jars
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release jars
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon --stacktrace buildReleaseJars

      - name: Upload release jars
        uses: actions/upload-artifact@v4
        with:
          name: release-jars
          if-no-files-found: error
          retention-days: 7
          path: build/release/*.jar

      - name: Upload test reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-java-${{ env.JAVA_VERSION }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            **/build/reports/tests/test
            **/build/test-results/test
            build/reports/problems
